version: 12
installer: "12-arm"
code: "91"
env: "idempiere_arm"
base_dir: "/opt/sas"
java: { home: "/usr/lib/jvm/java-17-openjdk-arm64", required_version: 17 }
database: { engine: "postgresql", version: 15, host: "localhost", port: 5432, name: "91_idempiere_arm", user: "adempiere", password: "adempiere", admin_user: "postgres" }
resources: { min_ram_gb: 4, recommended_ram_gb: 8, min_disk_gb: 20, recommended_disk_gb: 50, disk_check_path: "/opt" }
ports: { web: 8091, ssl: 8491, shutdown: 8006 }
service: { name: "91_idempiere_arm", user: "idempiere", type: "systemd" }
nginx: { enabled: false, domain: "arm.example.com", ssl_enabled: false }
idempiere: { download_url: "https://sourceforge.net/projects/idempiere/files/v12/daily-server/idempiereServer12Daily.gtk.linux.x86_64.zip/download", install_path: "/opt/sas/91_idempiere_arm" }
install: { create_database: true, restore_database: false, create_service: true, configure_nginx: false }
dependencies: { install_missing: false, base: true, java: true, postgres: true, nginx: false, packages: [curl, wget, unzip, tar, fontconfig, git] }
